name: vcfsim
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # vcfsim 1.0.0: first stable release (May 2025). Not yet on bioconda/conda-forge;
  # install from GitHub tag. conda-forge has channel priority over bioconda.
  - python>=3.10
  - pip
  - htslib    # provides bgzip + tabix for indexing output VCFs
  - samtools
  - pip:
    - git+https://github.com/samuk-lab/vcfsim.git@1.0.0
