name: old_pixy
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # pixy 0.95.01: most recent legacy zarr-backed single-core pixy on conda-forge.
  # (0.95.02 does not exist on conda-forge; 0.95.01 is the correct latest.)
  # conda-forge has channel priority over bioconda.
  # Uses --zarr_path for VCF ingestion; no --n_cores or --chunk_size.
  # Python version unpinned — 0.95.01 only has py36/py38 builds; let mamba resolve.
  # VERIFY after install: pixy --help to confirm --zarr_path and
  # whether --bypass_filtration exists.
  - pixy=0.95.01
  - htslib    # provides tabix for VCF indexing and zarr ingestion
  - samtools
