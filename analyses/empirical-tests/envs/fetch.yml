name: empirical_tests_fetch
# Fetch + alignment env (BAM slicing for anopheles, FASTQ -> BWA -> BAM for arenosa).
channels:
  - conda-forge
  - bioconda
channel_priority: strict
dependencies:
  - python=3.11
  - bcftools=1.23.1
  - samtools=1.23.1
  - htslib=1.23.1
  - bedtools=2.31.1
  - tabix
  - bwa-mem2=2.2.1
  - fastp=0.23.4
  - bash
  - coreutils
  - findutils
  - gawk
  - grep
  - sed
  - curl
  - wget
  - parallel
