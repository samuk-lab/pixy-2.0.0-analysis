name: empirical_tests_pixy
# Analysis env: pixy 2.0.0 + bcftools/tabix for VCF subset operations.
# scikit-allel pulls in an old dask that breaks with numpy >= 2.0; the
# 00_create_environments.sh post-install hook upgrades dask after env build.
channels:
  - conda-forge
  - bioconda
channel_priority: strict
dependencies:
  - python=3.11
  - pixy>=2.0.0
  - bcftools=1.23.1
  - htslib=1.23.1
  - tabix
  - numpy
  - pandas
  - pip
  - bash
  - coreutils
  - findutils
  - gawk
